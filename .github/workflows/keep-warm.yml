name: keep-warm

# Sparse backup refresh for fully-idle periods. NOTE: GitHub's scheduler is
# best-effort and often runs far less often than requested, so this is only a
# backstop — the primary refresh is visitor traffic (which, via Apify, is now
# reliable). For guaranteed 1-minute freshness with zero viewers, use an external
# pinger like cron-job.org hitting /api/poll with the Bearer token.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh the live count
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -s -m 55 -o /dev/null -w "poll -> %{http_code}\n" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://vozinha-follower-count.vercel.app/api/poll" || true
